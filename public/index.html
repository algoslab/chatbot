<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Chat Widget</title>
<link rel="icon" type="image/x-icon" href="images/favicon.png">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/chat-widget.css">

</head>
<body>

<!-- Floating Button -->
<button class="btn btn-primary chat-toggle" id="toggleChat">
    <i class="bi bi-chat-dots-fill fs-3"></i>
</button>

<!-- Chat Window -->
<div class="chat-box" id="chatBox">

    <!-- Header -->
    <div class="chat-header d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center">

            <img src="https://i.pravatar.cc/45?img=5"
                 class="rounded-circle me-2">

            <div>
                <strong>Customer Support</strong><br>
                <small>Online</small>
            </div>

        </div>

        <button class="btn btn-light btn-sm" id="closeChat">
            <i class="bi bi-x-lg"></i>
        </button>

    </div>

    <!-- Messages -->
    <div class="chat-body" id="messages">

        <div class="message bot">
            <div>
                <div class="bubble">
                    👋 Hello! How can we help you today?
                </div>
                <div class="time">Now</div>
            </div>
        </div>

        <div id="typing" class="typing">
            Support is typing...
        </div>

    </div>

    <!-- Footer -->
    <div class="chat-footer">

        <div class="input-group">

            <!-- Emoji -->
            <button class="btn btn-outline-secondary" id="emojiBtn">
                <i class="bi bi-emoji-smile"></i>
            </button>

            <!-- Upload -->
            <button class="btn btn-outline-secondary" id="uploadBtn">
                <i class="bi bi-paperclip"></i>
            </button>

            <input type="file" id="fileInput" hidden>

            <!-- Message -->
            <input
                type="text"
                class="form-control"
                id="messageInput"
                placeholder="Type your message...">

            <!-- Send -->
            <button class="btn btn-primary" id="sendBtn">
                <i class="bi bi-send-fill"></i>
            </button>

        </div>

        <!-- Emoji Picker -->
        <div id="emojiPicker">
            <span>😀</span>
            <span>😁</span>
            <span>😂</span>
            <span>🤣</span>
            <span>😊</span>
            <span>😍</span>
            <span>😘</span>
            <span>😎</span>
            <span>🤔</span>
            <span>😢</span>
            <span>😭</span>
            <span>😡</span>
            <span>👍</span>
            <span>👏</span>
            <span>🙌</span>
            <span>🔥</span>
            <span>❤️</span>
            <span>🎉</span>
            <span>🚀</span>
            <span>💯</span>
        </div>

    </div>

</div>

<script src="js/chat-widget.js"></script>
</body>
</html>
