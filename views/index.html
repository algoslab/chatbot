<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Chat Widget</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
    height:200vh;
}

/* Floating Button */
.chat-toggle{
    position:fixed;
    right:20px;
    bottom:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    z-index:9999;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
}

/* Chat Window */
.chat-box{
    position:fixed;
    right:10px;
    top:0;
    width:380px;
    max-width:100%;
    height:100vh;
    background:#fff;
    display:none;
    flex-direction:column;
    box-shadow:-5px 0 20px rgba(0,0,0,.15);
    animation:slideIn .3s;
    z-index:9998;
}

@keyframes slideIn{
    from{
        transform:translateX(100%);
    }
    to{
        transform:translateX(0);
    }
}

/* Header */
.chat-header{
    background:#0d6efd;
    color:#fff;
    padding:15px;
}

/* Body */
.chat-body{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#eef2f7;
}

/* Footer */
.chat-footer{
    border-top:1px solid #ddd;
    padding:10px;
    background:#fff;
}

/* Messages */
.message{
    display:flex;
    margin-bottom:5px;
}

.message.user{
    justify-content:flex-end;
}

.bubble{
    padding:5px 10px;
    border-radius:18px;
    max-width:100%;
    word-wrap:break-word;
}

.bot .bubble{
    background:#fff;
    border:1px solid #ddd;
}

.user .bubble{
    background:#0d6efd;
    color:#fff;
}

.time{
    font-size:11px;
    color:#888;
    margin-top:4px;
}

.typing{
    display:none;
    color:#666;
    font-size:13px;
    margin-bottom:10px;
}

/* Emoji Picker */
#emojiPicker{
    display:none;
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
    max-height:120px;
    overflow-y:auto;
}

#emojiPicker span{
    cursor:pointer;
    font-size:24px;
    margin:5px;
    display:inline-block;
}

#emojiPicker span:hover{
    transform:scale(1.2);
}
</style>
</head>
<body>

<!-- Floating Button -->
<button class="btn btn-primary chat-toggle" id="toggleChat">
    <i class="bi bi-chat-dots-fill fs-3"></i>
</button>

<!-- Chat Window -->
<div class="chat-box" id="chatBox">

    <!-- Header -->
    <div class="chat-header d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center">

            <img src="https://i.pravatar.cc/45?img=5"
                 class="rounded-circle me-2">

            <div>
                <strong>Customer Support</strong><br>
                <small>Online</small>
            </div>

        </div>

        <button class="btn btn-light btn-sm" id="closeChat">
            <i class="bi bi-x-lg"></i>
        </button>

    </div>

    <!-- Messages -->
    <div class="chat-body" id="messages">

        <div class="message bot">
            <div>
                <div class="bubble">
                    👋 Hello! How can we help you today?
                </div>
                <div class="time">Now</div>
            </div>
        </div>

        <div id="typing" class="typing">
            Support is typing...
        </div>

    </div>

    <!-- Footer -->
    <div class="chat-footer">

        <div class="input-group">

            <!-- Emoji -->
            <button class="btn btn-outline-secondary" id="emojiBtn">
                <i class="bi bi-emoji-smile"></i>
            </button>

            <!-- Upload -->
            <button class="btn btn-outline-secondary" id="uploadBtn">
                <i class="bi bi-paperclip"></i>
            </button>

            <input type="file" id="fileInput" hidden>

            <!-- Message -->
            <input
                type="text"
                class="form-control"
                id="messageInput"
                placeholder="Type your message...">

            <!-- Send -->
            <button class="btn btn-primary" id="sendBtn">
                <i class="bi bi-send-fill"></i>
            </button>

        </div>

        <!-- Emoji Picker -->
        <div id="emojiPicker">
            <span>😀</span>
            <span>😁</span>
            <span>😂</span>
            <span>🤣</span>
            <span>😊</span>
            <span>😍</span>
            <span>😘</span>
            <span>😎</span>
            <span>🤔</span>
            <span>😢</span>
            <span>😭</span>
            <span>😡</span>
            <span>👍</span>
            <span>👏</span>
            <span>🙌</span>
            <span>🔥</span>
            <span>❤️</span>
            <span>🎉</span>
            <span>🚀</span>
            <span>💯</span>
        </div>

    </div>

</div>

<script>

const toggleChat=document.getElementById("toggleChat");
const closeChat=document.getElementById("closeChat");
const chatBox=document.getElementById("chatBox");

const sendBtn=document.getElementById("sendBtn");
const messageInput=document.getElementById("messageInput");
const messages=document.getElementById("messages");

const emojiBtn=document.getElementById("emojiBtn");
const emojiPicker=document.getElementById("emojiPicker");

const uploadBtn=document.getElementById("uploadBtn");
const fileInput=document.getElementById("fileInput");

const typing=document.getElementById("typing");

/* Open Chat */
toggleChat.onclick=function(){

    chatBox.style.display="flex";
    toggleChat.style.display="none";

}

/* Close Chat */
closeChat.onclick=function(){

    chatBox.style.display="none";
    toggleChat.style.display="block";

}

/* Time */
function time(){

    return new Date().toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit"
    });

}

/* Add Message */
function addMessage(content,type){

    const div=document.createElement("div");

    div.className="message "+type;

    div.innerHTML=`
        <div>
            <div class="bubble">${content}</div>
            <div class="time">${time()}</div>
        </div>
    `;

    messages.insertBefore(div,typing);

    messages.scrollTop=messages.scrollHeight;

}

/* Send */
function sendMessage(){

    const text=messageInput.value.trim();

    if(text=="") return;

    addMessage(text,"user");

    messageInput.value="";

    fakeReply();

}

sendBtn.onclick=sendMessage;

messageInput.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        sendMessage();

    }

});

/* Fake Reply */
function fakeReply(){

    typing.style.display="block";

    messages.scrollTop=messages.scrollHeight;

    setTimeout(function(){

        typing.style.display="none";

        const replies=[
            "Thank you 😊",
            "We'll reply shortly.",
            "Can you explain a little more?",
            "Our team is checking.",
            "Thanks for contacting us!"
        ];

        addMessage(
            replies[Math.floor(Math.random()*replies.length)],
            "bot"
        );

    },1200);

}

/* Emoji */
emojiBtn.onclick=function(){

    emojiPicker.style.display=
    emojiPicker.style.display==="block"
    ?"none":"block";

}

document.querySelectorAll("#emojiPicker span").forEach(function(emoji){

    emoji.onclick=function(){

        messageInput.value+=emoji.innerText;

        messageInput.focus();

    }

});

/* Upload */
uploadBtn.onclick=function(){

    fileInput.click();

}

fileInput.onchange=function(){

    const file=this.files[0];

    if(!file) return;

    if(file.type.startsWith("image/")){

        const reader=new FileReader();

        reader.onload=function(e){

            addMessage(
                `<img src="${e.target.result}" class="img-fluid rounded" style="max-width:220px;">`,
                "user"
            );

        }

        reader.readAsDataURL(file);

    }

    else{

        addMessage(
            `<i class="bi bi-file-earmark"></i> ${file.name}`,
            "user"
        );

    }

    this.value="";

}

</script>

</body>
</html>
